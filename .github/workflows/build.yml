name: Compile Project with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        
      - name: Set up JDK 1.15
        uses: actions/setup-java@v1
        with:
          java-version: 1.15
      
      - name: Cache Maven local repository
        uses: actions/cache@v2
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/build.gradle', '~/spigot_buildtools/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
     
      - name: Cache Gradle
        uses: actions/cache@v2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Cache Spigot BuildTools
        uses: actions/cache@v2
        with:
          path: |
            ~/spigot_buildtools
          key: ${{ runner.os }}-spigot_buildtools-${{ hashFiles('~/spigot_buildtools/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-spigot_buildtools-
      
      - name: Compile spigot 1.16.5 from sources
        run: |
          mkdir -p ~/spigot_buildtools
          cd ~/spigot_buildtools
          wget -nc https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar -O BuildTools.jar || true
          java -Xmx1500M -jar BuildTools.jar --compile-if-changed --rev 1.16.5
      
      - name: Build with Gradle
        run: | 
          chmod +x gradlew
          ./gradlew build
